services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: file:/app/data/yahaml.db
      RELAY_PORT: 10000
      RELAY_HOST: 0.0.0.0
      UDP_PORT: 2237
      UDP_HOST: 0.0.0.0
      OAUTH_ENABLED: "false"
    volumes:
      - ./data:/app/data
    ports:
      - "${YAHAML_API_PORT:-3000}:3000"
      - "${YAHAML_RELAY_PORT:-10000}:10000"
      - "${YAHAML_UDP_PORT:-2237}:2237/udp"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${YAHAML_UI_PORT:-8080}:80"
