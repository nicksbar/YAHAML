name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Build, Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
      
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci
      
      - name: Setup test database
        run: |
          mkdir -p .test-db
          echo "DATABASE_URL=file:./.test-db/test.db" >> $GITHUB_ENV
      
      - name: Sync Prisma schema
        run: npx prisma db push
        env:
          DATABASE_URL: file:./.test-db/test.db

      - name: Run backend lint
        run: npm run lint
        env:
          DATABASE_URL: file:./.test-db/test.db

      - name: Run backend build
        run: npm run build
        env:
          DATABASE_URL: file:./.test-db/test.db

      - name: Run UI build
        run: npm --prefix ui run build
      
      - name: Run backend unit tests
        run: npm test
        env:
          CI: true
          DATABASE_URL: file:./.test-db/test.db

  browser-tests:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:browser
        env:
          CI: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  branch-naming:
    name: Check Branch Naming
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Validate branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          
          # Check if branch follows naming convention: feature/*, bugfix/*, hotfix/*, docs/*, refactor/*
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|docs|refactor)/.+ ]]; then
            echo "❌ Branch name must follow the pattern: <type>/<description>"
            echo ""
            echo "Valid types:"
            echo "  - feature/   : New features"
            echo "  - bugfix/    : Bug fixes"
            echo "  - hotfix/    : Urgent fixes"
            echo "  - docs/      : Documentation changes"
            echo "  - refactor/  : Code refactoring"
            echo ""
            echo "Example: feature/add-session-tracking"
            echo ""
            echo "Your branch: $BRANCH_NAME"
            exit 1
          fi
          
          echo "✅ Branch name is valid: $BRANCH_NAME"
