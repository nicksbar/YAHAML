services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yahaml
      POSTGRES_PASSWORD: yahaml
      POSTGRES_DB: yahaml
    volumes:
      - yahaml_pgdata:/var/lib/postgresql/data
    # Intentionally not publishing 5432 by default.
    # API connects to db over the internal Docker network.
    # If you need external access, add: "<host-port>:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PRISMA_SCHEMA: ./prisma/schema.postgres.prisma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://yahaml:yahaml@db:5432/yahaml?schema=public
      PRISMA_SCHEMA: /app/prisma/schema.postgres.prisma
      PRISMA_MIGRATE: push
      RELAY_PORT: 10000
      RELAY_HOST: 0.0.0.0
      UDP_PORT: 2237
      UDP_HOST: 0.0.0.0
      OAUTH_ENABLED: "false"
    ports:
      - "${YAHAML_API_PORT:-3000}:3000"
      - "${YAHAML_RELAY_PORT:-10000}:10000"
      - "${YAHAML_UDP_PORT:-2237}:2237/udp"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${YAHAML_UI_PORT:-80}:80"

volumes:
  yahaml_pgdata:
