services:
  janus:
    build:
      context: .
      dockerfile: docker/Dockerfile.janus
      args:
        JANUS_VERSION: ${JANUS_VERSION:-v1.4.1}
    restart: unless-stopped
    container_name: yahaml-janus
    environment:
      JANUS_ADMIN_SECRET: ${JANUS_ADMIN_SECRET:-yahaml-dev-secret}
      JANUS_DEBUG_LEVEL: ${JANUS_DEBUG_LEVEL:-4}
      JANUS_RTP_PORT_RANGE: ${JANUS_RTP_PORT_RANGE:-20000-20039}
    ports:
      - "${JANUS_API_PORT:-8088}:8088"
      - "${JANUS_WS_PORT:-8188}:8188"
      - "${JANUS_ADMIN_PORT:-7088}:7088"
      - "${JANUS_RTP_PORT_RANGE:-20000-20039}:${JANUS_RTP_PORT_RANGE:-20000-20039}/udp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -X POST http://localhost:8088/janus -H 'Content-Type: application/json' -d '{\"janus\":\"info\",\"transaction\":\"healthcheck\"}' > /dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yahaml
      POSTGRES_PASSWORD: yahaml
      POSTGRES_DB: yahaml
    volumes:
      - yahaml_pgdata:/var/lib/postgresql/data
    # Intentionally not publishing 5432 by default.
    # API connects to db over the internal Docker network.
    # If you need external access, add: "<host-port>:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PRISMA_SCHEMA: ./prisma/schema.postgres.prisma
    restart: unless-stopped
    depends_on:
      janus:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://yahaml:yahaml@db:5432/yahaml?schema=public
      PRISMA_SCHEMA: /app/prisma/schema.postgres.prisma
      PRISMA_MIGRATE: push
      RELAY_PORT: 10000
      RELAY_HOST: 0.0.0.0
      UDP_PORT: 2237
      UDP_HOST: 0.0.0.0
      OAUTH_ENABLED: "false"
      JANUS_API_URL: http://janus:8088/janus
      JANUS_API_SECRET: ${JANUS_ADMIN_SECRET:-yahaml-dev-secret}
      JANUS_TIMEOUT_MS: 8000
    ports:
      - "${YAHAML_API_PORT:-3000}:3000"
      - "${YAHAML_RELAY_PORT:-10000}:10000"
      - "${YAHAML_UDP_PORT:-2237}:2237/udp"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${YAHAML_UI_PORT:-8080}:80"

volumes:
  yahaml_pgdata:
